name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

# Cancel outdated runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Security: minimal permissions
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    # TODO: Add service containers (PostgreSQL, Redis) for integration tests

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true  # speed up CI

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Run Ruff (lint)
        run: uv run ruff check .

      - name: Run Ruff (format check)
        run: uv run ruff format --check .

      - name: Run mypy
        run: uv run mypy src/

      - name: Run tests
        run: uv run pytest
        
      # TODO: Add coverage threshold (--cov-fail-under=80)
      # TODO: Separate fast/slow tests (skip slow integration tests in CI)
        